<html>
<head>
    <title>AR Caixa PRO</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>

<body>
<a-scene embedded arjs="sourceType: webcam;">

    <!-- 💡 HDR fake -->
    <a-light type="ambient" intensity="1.5"></a-light>
    <a-light type="directional" position="1 3 2" intensity="2"></a-light>

    <a-marker preset="hiro">

        <!-- 🎯 CONTROLE -->
        <a-entity id="control" position="0 0.3 0">

            <!-- 📦 CAIXA -->
            <a-entity 
                id="caixa"
                gltf-model="model/scene.gltf"
                scale="0.5 0.5 0.5"
                rotation="0 180 0">
            </a-entity>

        </a-entity>

    </a-marker>

    <a-entity camera></a-entity>

</a-scene>

<script>
window.onload = () => {

const control = document.querySelector('#control');

let rotY = 0;
let escala = 0.5;
let aberta = false;

// 👉 ROTACIONAR COM DEDO
document.addEventListener('touchmove', (e) => {
    if (e.touches.length == 1) {
        rotY += e.touches[0].movementX || 1;
        control.setAttribute('rotation', `0 ${rotY} 0`);
    }
});

// 👉 PINÇA (ZOOM)
let distInicial = 0;

document.addEventListener('touchmove', (e) => {
    if (e.touches.length == 2) {

        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if (distInicial == 0) distInicial = dist;

        let delta = dist - distInicial;

        escala += delta * 0.001;
        escala = Math.max(0.3, Math.min(1.5, escala));

        control.setAttribute('scale', `${escala} ${escala} ${escala}`);

        distInicial = dist;
    }
});

document.addEventListener('touchend', () => {
    distInicial = 0;
});

// 👉 ABRIR TAMPA (fake)
control.addEventListener('click', () => {

    if (!aberta) {
        control.setAttribute('animation__open', {
            property: 'rotation',
            to: '-50 ' + rotY + ' 0',
            dur: 500
        });
    } else {
        control.setAttribute('animation__close', {
            property: 'rotation',
            to: '0 ' + rotY + ' 0',
            dur: 500
        });
    }

    aberta = !aberta;
});

};
</script>

</body>
</html>
